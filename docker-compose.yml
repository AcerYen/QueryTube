services:
  querytube:
    build: .
    container_name: querytube_agent
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    env_file:
      - .env
    environment:
      TZ: Asia/Taipei
    # LINE webhook: bind to localhost only (Cloudflare Tunnel / reverse proxy on host).
    # Omit or leave unused when LINE credentials are not set.
    ports:
      - "127.0.0.1:8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
