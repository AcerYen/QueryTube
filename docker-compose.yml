services:
  querytube:
    build: .
    container_name: querytube_agent
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    env_file:
      - .env
    environment:
      TZ: Asia/Taipei
    # LINE webhook: bind to localhost only (ngrok on host / host network).
    # Omit or leave unused when LINE credentials are not set.
    ports:
      - "127.0.0.1:8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: expose LINE webhook via ngrok (no custom domain required).
  # Start with: docker compose --profile line up -d
  # Requires NGROK_AUTHTOKEN and NGROK_DOMAIN in .env
  ngrok:
    image: ngrok/ngrok:latest
    container_name: querytube_ngrok
    profiles: ["line"]
    restart: unless-stopped
    network_mode: host
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "127.0.0.1:8080"
      - "--domain=${NGROK_DOMAIN}"
